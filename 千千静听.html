<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>本地音乐播放器</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #121212;
  color: #fff;
  font-family: system-ui, sans-serif;
  max-width: 500px;
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.title {
  padding: 14px;
  text-align: center;
  font-size: 16px;
  background: #1e1e1e;
}

.progress {
  padding: 10px 16px;
  background: #1e1e1e;
}
.time {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #aaa;
  margin-bottom: 6px;
}
#bar {
  width: 100%;
  height: 5px;
  background: #333;
  border-radius: 3px;
  -webkit-appearance: none;
}
#bar::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: #1db954;
  border-radius: 50%;
}

.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 24px;
  padding: 20px;
  background: #1e1e1e;
}
.controls button {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: #1db954;
  color: #000;
  font-size: 24px;
}
.controls .small {
  width: 40px;
  height: 40px;
  font-size: 20px;
  background: #333;
  color: #fff;
}

.file-area {
  padding: 12px 16px;
  background: #1e1e1e;
}
#file {
  width: 100%;
  padding: 10px;
  background: #333;
  color: #fff;
  border: none;
  border-radius: 8px;
}

.list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}
.item {
  display: flex;
  align-items: center;
  padding: 12px 10px;
  border-bottom: 1px solid #2a2a2a;
  cursor: pointer;
}
.item .no {
  width: 30px;
  text-align: right;
  color: #888;
  font-size: 14px;
}
.item .name {
  margin-left: 10px;
  font-size: 15px;
}
.item.active {
  background: #1db95422;
  color: #1db954;
}
.item.active .no {
  color: #1db954;
}
</style>
</head>
<body>

<div class="title" id="title">未播放</div>

<div class="progress">
  <div class="time">
    <span id="curr">00:00</span>
    <span id="dur">00:00</span>
  </div>
  <input type="range" id="bar" min="0" max="100" value="0">
</div>

<div class="controls">
  <button class="small" id="prev">⏮</button>
  <button id="play">▶</button>
  <button class="small" id="next">⏭</button>
</div>

<div class="file-area">
  <input type="file" id="file" accept="audio/*" multiple>
</div>

<div class="list" id="list"></div>

<audio id="audio">

<script>
const audio = document.getElementById('audio');
const listEl = document.getElementById('list');
const title = document.getElementById('title');
const bar = document.getElementById('bar');
const currTxt = document.getElementById('curr');
const durTxt = document.getElementById('dur');
const playBtn = document.getElementById('play');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

let playlist = [];
let current = -1;

// 双击判断（250ms内连按）
let lastPrev = 0;
let lastNext = 0;
const dbClickTime = 250;

function fmt(t) {
  if (isNaN(t)) return "00:00";
  const m = Math.floor(t / 60).toString().padStart(2, '0');
  const s = Math.floor(t % 60).toString().padStart(2, '0');
  return m + ':' + s;
}

function playItem(index) {
  if (index < 0 || index >= playlist.length) return;
  current = index;
  audio.src = playlist[index].url;
  audio.play();
  title.textContent = playlist[index].name;
  playBtn.textContent = "⏸";
  renderList();
}

function renderList() {
  listEl.innerHTML = '';
  playlist.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'item' + (i === current ? ' active' : '');
    div.innerHTML = `<span class="no">${i+1}</span><span class="name">${item.name}</span>`;
    div.onclick = () => playItem(i);
    listEl.appendChild(div);
  });
}

// 文件选择
document.getElementById('file').addEventListener('change', (e) => {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    playlist.push({ name: file.name, url: URL.createObjectURL(file) });
  });
  renderList();
  if (current === -1 && playlist.length) playItem(0);
});

// 进度
audio.ontimeupdate = () => {
  bar.value = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  currTxt.textContent = fmt(audio.currentTime);
};
audio.onloadedmetadata = () => durTxt.textContent = fmt(audio.duration);
bar.oninput = () => {
  if (audio.duration) audio.currentTime = (bar.value / 100) * audio.duration;
};

// 播放暂停
playBtn.onclick = () => {
  if (!playlist.length) return;
  if (current === -1) return playItem(0);
  audio.paused ? audio.play() : audio.pause();
  playBtn.textContent = audio.paused ? '▶' : '⏸';
};

// 上一首：单击上一首，双击快退15秒
prevBtn.onclick = () => {
  const now = Date.now();
  const isDb = now - lastPrev < dbClickTime;
  lastPrev = now;
  if (isDb) {
    audio.currentTime = Math.max(0, audio.currentTime - 15);
  } else {
    if (current > 0) playItem(current - 1);
  }
};

// 下一首：单击下一首，双击快进15秒
nextBtn.onclick = () => {
  const now = Date.now();
  const isDb = now - lastNext < dbClickTime;
  lastNext = now;
  if (isDb) {
    audio.currentTime = Math.min(audio.duration, audio.currentTime + 15);
  } else {
    if (current < playlist.length - 1) playItem(current + 1);
  }
};

// 自动下一首
audio.onended = () => {
  if (current < playlist.length - 1) playItem(current + 1);
};
</script>
</body>
</html>
